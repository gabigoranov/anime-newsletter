networks:
  web_network:
    external: false

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - web_network
  # Our Backend Box
  backend:
    build:
      context: ./backend # Tells Docker where to find the backend Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=true  
    networks:
      - web_network
      
  # Our Frontend Box
  frontend:
    build:
      context: ./frontend # Tells Docker where to find the frontend Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules # This keeps the heavy Node tools safely inside the box so they don't clutter your computer.
    depends_on:
      - backend # Tells the frontend to wait nicely for the backend to wake up first
    networks:
      - web_network