events { worker_connections 1024; }

http {
    # 1. THE TRAP BLOCK: Kills raw IP addresses instantly
    server {
        listen 80 default_server;
        server_name _;
        return 444; 
    }

    # 2. YOUR NEW PROJECT BLOCK (No SSL needed here - runs on port 80!)
    server {
        listen 80;
        server_name vmi3331038.contaboserver.net;

        location /jenkins/ {
            proxy_pass http://jenkins:8080/jenkins/;
            
            # Essential Jenkins proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Fixes potential redirect loops
            proxy_redirect http://jenkins:8080/jenkins/ http://vmi3331038.contaboserver.net/jenkins/;
        }

        # Send regular visitors to the Frontend
        location / {
            proxy_pass http://frontend:5173; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Send backend data requests to the Backend API
        location /api/ {
            proxy_pass http://backend:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}