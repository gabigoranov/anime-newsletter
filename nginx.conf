events { worker_connections 1024; }

http {
    # 1. THE TRAP BLOCK: Kills raw IP addresses instantly
    server {
        listen 80 default_server;
        server_name _;
        return 444; 
    }

    # 2. HTTP TO HTTPS REDIRECT: Upgrades all users automatically
    server {
        listen 80;
        server_name vmi3331038.contaboserver.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 3. YOUR NEW SECURE HTTPS BLOCK
    server {
        listen 443 ssl;
        server_name vmi3331038.contaboserver.net;

        # SSL Certificates (Points to the folders mapped in your docker-compose)
        ssl_certificate /etc/letsencrypt/live/vmi3331038.contaboserver.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vmi3331038.contaboserver.net/privkey.pem;

        # Secure default TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Secure Jenkins Routing
        location /jenkins/ {
            proxy_pass http://jenkins:8080/jenkins/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Enforces HTTPS redirect rules inside Jenkins proxy mechanics
            proxy_redirect http://jenkins:8080/jenkins/ https://vmi3331038.contaboserver.net/jenkins/;
        }

        # Send backend data requests to the Backend API
        location /api/ {
            proxy_pass http://backend:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Send regular visitors to the Frontend
        location / {
            proxy_pass http://frontend:5173; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}