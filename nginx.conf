events { worker_connections 1024; }

http {
    # 1. THE TRAP BLOCK: Kills raw IP addresses instantly
    server {
        listen 80 default_server;
        server_name _;
        return 444; 
    }

    # 2. YOUR NEW PROJECT BLOCK (No SSL needed here - runs on port 80!)
    server {
        listen 80;
        server_name vmi3331038.contaboserver.net;

        # Send regular visitors to the Frontend
        location / {
            proxy_pass http://frontend:5173; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Send backend data requests to the Backend API
        location /api/ {
            proxy_pass http://backend:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # 3. ROUTE TO N8N (Hands the steering wheel to Caddy for SSL)
    server {
        listen 443 ssl;
        server_name vmi3331038.contaboserver.net;

        # We tell Nginx to just grab Caddy's certificates directly from the host if needed,
        # But to keep it working right now, we can route it via HTTP port 8081 directly to Caddy!
        location / {
            proxy_pass http://172.17.0.1:8081; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}